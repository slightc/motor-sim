; PlatformIO 工程：X-NUCLEO-IHM07M1 + NUCLEO-F302R8 基础 FOC
; 算法层 foc.c 由仿真 core 移植（见 firmware/test 的逐点回归）。
;
; 常用命令（见 skills/pio/SKILL.md）：
;   pio run                 编译
;   pio run -t upload       烧录（ST-Link）
;   pio device monitor      串口监视
;   pio run -t clean        清理
[env:nucleo_f302r8]
platform  = ststm32
board     = nucleo_f302r8
framework = stm32cube

upload_protocol = stlink
debug_tool      = stlink
monitor_speed   = 115200

build_flags =
  -Iinclude
  -DHSE_VALUE=8000000          ; NUCLEO 由 ST-LINK MCO 提供 8MHz
  -DUSE_HAL_DRIVER
  -Wall
  -Wextra
  -ffast-math                  ; 单精度三角/平方根，电流环够快

; 只编译 firmware/src（test/ 是 PC 端回归，不进固件）
build_src_filter = +<*> -<../test/>
